# coturn dev configuration
# Docs: https://github.com/coturn/coturn/wiki

# STUN / TURN listening ports
listening-port=3478
tls-listening-port=5349

# Bind to all interfaces inside the container
listening-ip=0.0.0.0

# Realm presented to clients
realm=openmeet.local

# Long-term credential mechanism (use static user for dev)
lt-cred-mech
user=meetuser:meetpass

# Relay UDP port range (must match docker-compose ports)
min-port=49160
max-port=49200

# Hardening / fingerprinting (still off TLS in dev)
fingerprint
no-tls
no-dtls

# Verbose logging to stdout so docker logs picks it up
verbose
log-file=stdout
no-stdout-log=false
simple-log

# Disable multicast peers — not used for WebRTC and unsafe
no-multicast-peers

# Disable CLI (so the container doesn't try to bind 5766 by default — we don't expose it)
no-cli
