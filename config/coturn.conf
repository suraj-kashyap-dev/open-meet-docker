# coturn dev config — https://github.com/coturn/coturn/wiki

# STUN/TURN listening ports
listening-port=3478
tls-listening-port=5349

# Bind to all interfaces in the container
listening-ip=0.0.0.0

# Realm presented to clients
realm=openmeet.local

# Long-term credentials (static user, dev only)
lt-cred-mech
user=meetuser:meetpass

# Relay UDP range (must match docker-compose ports)
min-port=49160
max-port=49200

# Fingerprinting on; TLS off in dev
fingerprint
no-tls
no-dtls

# Log to stdout so `docker logs` picks it up
verbose
log-file=stdout
no-stdout-log=false
simple-log

# Not used for WebRTC and unsafe
no-multicast-peers

# Disable CLI (avoids binding 5766)
no-cli
